name: Production Deploy

on:
  push:
    branches:
      - production
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push-server:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(jq -r '.version' package.json)
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "SHA_SHORT=${SHA_SHORT}" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/template-server
          tags: |
            type=raw,value=${{ steps.version.outputs.VERSION }}
            type=raw,value=${{ steps.version.outputs.VERSION }}-${{ steps.version.outputs.SHA_SHORT }}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-static:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - run: bun install --frozen-lockfile

      - name: Build website
        run: bun run build:website
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: ${{ secrets.PRODUCTION_API_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.PRODUCTION_WEBSITE_URL }}
          NEXT_PUBLIC_DASHBOARD_URL: ${{ vars.PRODUCTION_DASHBOARD_URL }}

      - name: Build dashboard
        run: bun run build:dashboard
        env:
          NODE_ENV: production
          VITE_API_URL: ${{ secrets.PRODUCTION_API_URL }}
          VITE_WEBSITE_URL: ${{ vars.PRODUCTION_WEBSITE_URL }}

      - uses: actions/upload-artifact@v4
        with:
          name: website-dist
          path: apps/website/out
          retention-days: 1

      - uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: apps/dashboard/dist
          retention-days: 1

  deploy-website:
    needs: build-static
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: website-dist
          path: website-dist
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy website-dist --project-name=shopora-website --branch=production

  deploy-dashboard:
    needs: build-static
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dashboard-dist
          path: dashboard-dist
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dashboard-dist --project-name=shopora-dashboard --branch=production
